name: MCBOT Concurrent Experiment

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      proxy-content: ${{ steps.process-proxy.outputs.content }}
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download MCBOT.jar
        run: wget https://github.com/nejason57mars/mcbot/raw/refs/heads/main/MCBOT.jar

      - name: Download and process proxy list
        id: process-proxy
        run: |
          wget https://github.com/proxifly/free-proxy-list/raw/refs/heads/main/proxies/protocols/socks4/data.txt -O proxy.txt
          sed -i 's/socks4:\/\///g' proxy.txt
          echo "content=$(cat proxy.txt | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Upload MCBOT.jar
        uses: actions/upload-artifact@v3
        with:
          name: mcbot-jar
          path: MCBOT.jar

      - name: Upload proxy.txt
        uses: actions/upload-artifact@v3
        with:
          name: proxy-txt
          path: proxy.txt

  run-commands:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        command: [
          "play.skyron.fun:24251",
          "79.127.236.116:25565"
        ]
        instance: [1, 2, 3, 4]  # Run 4 instances of each command
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download MCBOT.jar
        uses: actions/download-artifact@v3
        with:
          name: mcbot-jar

      - name: Download proxy.txt
        uses: actions/download-artifact@v3
        with:
          name: proxy-txt

      - name: Run MCBOT command
        run: |
          chmod +x MCBOT.jar
          java -jar MCBOT.jar ${{ matrix.command }} 340 join 300 -1
