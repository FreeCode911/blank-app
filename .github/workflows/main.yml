name: MCBOT Concurrent Experiment

on:
  workflow_dispatch:
    inputs:
      server1:
        description: 'First server address (e.g., play.skyron.fun:24251)'
        required: true
        default: 'play.skyron.fun:24251'
      server2:
        description: 'Second server address (e.g., 79.127.236.116:25565)'
        required: true
        default: '79.127.236.116:25565'
      instances:
        description: 'Number of instances per command'
        required: true
        default: '4'
      threads:
        description: 'Number of threads per bot'
        required: true
        default: '340'
      join_delay:
        description: 'Join delay in milliseconds'
        required: true
        default: '300'
      proxy_mode:
        description: 'Proxy mode (-1 for random, 0 for sequential)'
        required: true
        default: '-1'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      proxy-content: ${{ steps.process-proxy.outputs.content }}
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download MCBOT.jar
        run: wget https://github.com/nejason57mars/mcbot/raw/refs/heads/main/MCBOT.jar

      - name: Download and process proxy list
        id: process-proxy
        run: |
          wget https://github.com/proxifly/free-proxy-list/raw/refs/heads/main/proxies/protocols/socks4/data.txt -O proxy.txt
          sed -i 's/socks4:\/\///g' proxy.txt
          echo "content=$(cat proxy.txt | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Upload MCBOT.jar
        uses: actions/upload-artifact@v4
        with:
          name: mcbot-jar
          path: MCBOT.jar

      - name: Upload proxy.txt
        uses: actions/upload-artifact@v4
        with:
          name: proxy-txt
          path: proxy.txt

  run-commands:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        command: [
          "${{ github.event.inputs.server1 }}",
          "${{ github.event.inputs.server2 }}"
        ]
        instance: ${{ fromJSON(format('[1,{0}]', github.event.inputs.instances)) }}
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download MCBOT.jar
        uses: actions/download-artifact@v4
        with:
          name: mcbot-jar

      - name: Download proxy.txt
        uses: actions/download-artifact@v4
        with:
          name: proxy-txt

      - name: Run MCBOT command
        run: |
          chmod +x MCBOT.jar
          echo "Starting MCBOT instance ${{ matrix.instance }} for ${{ matrix.command }}"
          echo "Parameters: threads=${{ github.event.inputs.threads }}, join_delay=${{ github.event.inputs.join_delay }}, proxy_mode=${{ github.event.inputs.proxy_mode }}"
          java -jar MCBOT.jar ${{ matrix.command }} ${{ github.event.inputs.threads }} join ${{ github.event.inputs.join_delay }} ${{ github.event.inputs.proxy_mode }}
